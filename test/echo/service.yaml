# ClusterIP — the shared Gateway is the LoadBalancer/entrypoint, so the backing
# Service does not need its own external IP.
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: echo
spec:
  type: ClusterIP
  selector:
    app: echo
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 3000
