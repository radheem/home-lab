# Zero-touch hook: attach to the SHARED gateway and declare a *.${LOCAL_TLD}
# hostname. ExternalDNS publishes echo.${LOCAL_TLD} -> Gateway LB IP into etcd;
# authoritative CoreDNS then answers for it. No per-app Gateway, no manual DNS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: echo
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - "echo.${LOCAL_TLD}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 8080
