# Reference app showing the ENTIRE zero-touch contract. To expose any new app:
#   1. Deployment + Service (normal).
#   2. An HTTPRoute with parentRefs -> the shared Gateway and a *.${LOCAL_TLD}
#      hostname. That's it — ExternalDNS publishes the DNS record automatically,
#      and the Gateway's wildcard cert already serves HTTPS for *.${LOCAL_TLD}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: demo
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: demo
spec:
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: demo
  # OPTIONAL: override the published target (defaults to the Gateway's LB IP).
  # annotations:
  #   external-dns.alpha.kubernetes.io/target: "${GATEWAY_LB_IP}"
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - "whoami.${LOCAL_TLD}"     # <- ExternalDNS turns this into an A record
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: whoami
          port: 80
