# In-cluster Docker registry (distribution/registry:2), HTTPS via the internal CA,
# no auth by default. Exposed on a pinned LB IP so LAN devices can `docker push
# registry.home.lan/...`; the k3s nodes pull the same names via the registries.yaml
# mirror (config/k3d-registries.yaml). To enable auth, see docs/runbooks/registry.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path        # PVs land on the host at CLUSTER_VOLUME_STORE
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  strategy:
    type: Recreate                    # single RWO volume — don't run two pods at once
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          env:
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          ports:
            - containerPort: 5000
              name: https
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: certs
          secret:
            secretName: registry-tls   # produced by certificate.yaml
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  annotations:
    # Pin the LoadBalancer IP via Cilium LB-IPAM, and publish registry.home.lan
    # automatically via ExternalDNS (--source=service is enabled).
    lbipam.cilium.io/ips: "${REGISTRY_LB_IP}"
    external-dns.alpha.kubernetes.io/hostname: "${REGISTRY_HOST}"
spec:
  type: LoadBalancer
  selector:
    app: registry
  ports:
    # Front on 443 so clients use `registry.home.lan` with no :port, and the
    # node-side mirror (https://<LB_IP>) hits the default HTTPS port too.
    - name: https
      port: 443
      targetPort: 5000
      protocol: TCP
