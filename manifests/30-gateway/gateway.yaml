# Shared Cilium Gateway on a pinned LoadBalancer IP. Apps attach HTTPRoutes to
# it from any namespace (allowedRoutes: All). ExternalDNS reads each route's
# hostname + this Gateway's address to publish DNS.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway-system
  annotations:
    # Pin the Gateway's LoadBalancer IP via Cilium LB-IPAM.
    lbipam.cilium.io/ips: "${GATEWAY_LB_IP}"
spec:
  gatewayClassName: cilium
  # Explicitly request the address too (belt-and-suspenders with the annotation).
  addresses:
    - type: IPAddress
      value: "${GATEWAY_LB_IP}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.${LOCAL_TLD}"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.${LOCAL_TLD}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-tls      # produced by 40-cert-manager
      allowedRoutes:
        namespaces:
          from: All
