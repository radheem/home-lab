# Single-node etcd: the record store ExternalDNS writes to and the authoritative
# CoreDNS reads from (SkyDNS key layout under /skydns). Data persists on the host
# device via the local-path PVC.
#
# Two services on purpose:
#  - `etcd` (headless): governs the StatefulSet + stable peer DNS (etcd-0.etcd...).
#  - `etcd-client` (pinned ClusterIP): what clients connect to, addressed BY IP.
#    The etcd/gRPC client used by ExternalDNS and CoreDNS-auth mis-resolves
#    Kubernetes hostnames under some node resolv.conf setups (inherited search
#    domains + ndots), so we hand them a fixed IP and skip name resolution.
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: dns-system
  labels:
    app: etcd
spec:
  clusterIP: None          # headless; stable per-pod DNS for the StatefulSet
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    app: etcd
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-client
  namespace: dns-system
  labels:
    app: etcd
spec:
  type: ClusterIP
  clusterIP: 10.43.0.20    # pinned (service CIDR is fixed 10.43.0.0/16); ref by IP
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: dns-system
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.16
          command:
            - /usr/local/bin/etcd
            - --name=etcd0
            - --data-dir=/etcd-data
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.dns-system.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd-0.etcd.dns-system.svc.cluster.local:2380
            - --initial-cluster=etcd0=http://etcd-0.etcd.dns-system.svc.cluster.local:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=k3d-lab-dns
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /etcd-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
