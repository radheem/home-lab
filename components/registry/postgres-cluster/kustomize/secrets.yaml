# Admin role creds (password generated into components.secrets.env on first deploy).
apiVersion: v1
kind: Secret
metadata:
  name: dbadmin-creds
  namespace: cnpg-system
type: kubernetes.io/basic-auth
stringData:
  username: dbadmin
  password: "${SECRET_POSTGRES_ADMIN_PASSWORD}"
---
# Connection creds for apps (same password).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-secret
  namespace: cnpg-system
type: Opaque
stringData:
  POSTGRES_USER: dbadmin
  POSTGRES_PASSWORD: "${SECRET_POSTGRES_ADMIN_PASSWORD}"
  POSTGRES_DB: appdb
