# Hatchet UI + API on the shared Gateway: /api -> api:8080, / -> frontend:80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hatchet
  namespace: workflow
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - "${COMP_HOSTNAME}.${DOMAIN}"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api }
      backendRefs:
        - name: hatchet-stack-api
          port: 8080
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: hatchet-stack-frontend
          port: 80
