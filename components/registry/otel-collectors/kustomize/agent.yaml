# OTel agent (daemonset) — collects node/pod logs+metrics+traces, forwards to the
# gateway. Replica of qe8-agent (renamed dev-agent; cluster attribute -> dev).
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: dev-agent
spec:
  mode: daemonset
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.111.0
  managementState: managed
  tolerations:
    - operator: Exists
  env:
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include: ["/var/log/pods/*/*/*.log"]
        exclude: ["/var/log/pods/monitoring_dev-agent*/*/*.log"]
        include_file_name: false
        include_file_path: true
        start_at: end
        operators:
          - type: container
            add_metadata_from_filepath: true
      hostmetrics:
        collection_interval: 30s
        root_path: /
        scrapers:
          cpu: {}
          disk: {}
          filesystem: {}
          load: {}
          memory: {}
          network: {}
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 30s
        endpoint: https://${env:KUBE_NODE_NAME}:10250
        insecure_skip_verify: true
        metric_groups: [node, pod, container]
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 15
      batch:
        send_batch_size: 10000
        timeout: 5s
      resourcedetection:
        detectors: [env, system]
        override: false
        system:
          hostname_sources: [os]
      resource:
        attributes:
          - { action: upsert, key: cluster, value: dev }
          - { action: upsert, key: k8s.cluster.name, value: dev }
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: KUBE_NODE_NAME
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.node.name
          labels:
            - { from: pod, key: app.kubernetes.io/name, tag_name: app.kubernetes.io/name }
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources: [{ from: resource_attribute, name: k8s.pod.ip }]
          - sources: [{ from: connection }]
    exporters:
      otlp/gateway:
        endpoint: dev-gateway-collector.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
    service:
      pipelines:
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, batch]
          exporters: [otlp/gateway]
        metrics:
          receivers: [otlp, kubeletstats, hostmetrics]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, batch]
          exporters: [otlp/gateway]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, batch]
          exporters: [otlp/gateway]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
