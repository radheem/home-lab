# Helm values for Cilium. Datapath: native routing, kube-proxy replacement,
# Gateway API, L2 announcements + LB-IPAM for LoadBalancer services.
routingMode: "native"
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.42.0.0/16"
ipam:
  mode: "kubernetes"

kubeProxyReplacement: true
k8sServicePort: 6443

l7Proxy: true

# Cilium creates the `cilium` GatewayClass when this is enabled.
gatewayAPI:
  enabled: true
  enableAlpn: true
  enableAppProtocol: true

loadBalancer:
  enabled: true
  algorithm: "maglev"
  acceleration: "native"
  l7:
    algorithm: "maglev"

bpf:
  masquerade: true
  lbAcceleration: "disable"

# Prometheus metrics on cilium-agent (:9962) — scraped into VictoriaMetrics.
prometheus:
  enabled: true

# Observability: Hubble flow visibility + UI + flow metrics (:9965).
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2

operator:
  replicas: 1
  prometheus:
    enabled: true            # cilium-operator metrics (:9963)

# Announce LoadBalancer / external IPs on the L2 segment (ARP).
l2announcements:
  enabled: true

externalIPs:
  enabled: true
