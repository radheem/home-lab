# Rendered by install.sh via envsubst, then passed to `k3d cluster create --config`.
# Cilium replaces flannel/kube-proxy/servicelb; k3s CoreDNS/Traefik are disabled
# (we run our own CoreDNS + Cilium Gateway API instead).
apiVersion: k3d.io/v1alpha5
kind: Simple
servers: ${SERVER_COUNT}
agents: ${AGENT_COUNT}
image: rancher/k3s:${K3S_VERSION}
subnet: "${CLUSTER_SUBNET}"

kubeAPI:
  host: ${API_SERVER_FQDN}
  hostIP: "0.0.0.0"
  hostPort: "${API_SERVER_PORT}"

volumes:
  # Backs the k3s local-path provisioner -> all PVCs persist on the host device.
  - volume: ${CLUSTER_VOLUME_STORE}:/var/lib/rancher/k3s/storage
    nodeFilters:
      - all

options:
  k3d:
    wait: true
    timeout: "360s"
    disableLoadbalancer: true       # Cilium L2 + LB-IPAM handles LoadBalancers
    disableImageVolume: false
    disableRollback: false
  k3s:
    extraArgs:
      - arg: "--disable=coredns"
        nodeFilters: [server:*]
      - arg: "--disable=servicelb"
        nodeFilters: [server:*]
      - arg: "--disable=traefik"
        nodeFilters: [server:*]
      - arg: "--disable=kube-proxy"
        nodeFilters: [server:*]
      - arg: "--flannel-backend=none"
        nodeFilters: [server:*]
      - arg: "--disable-network-policy"
        nodeFilters: [server:*]
      - arg: "--cluster-cidr=10.42.0.0/16"
        nodeFilters: [server:*]
      - arg: "--service-cidr=10.43.0.0/16"
        nodeFilters: [server:*]
      - arg: "--tls-san=${API_SERVER_FQDN}"
        nodeFilters: [server:*]
      - arg: "--tls-san=127.0.0.1"
        nodeFilters: [server:*]
      - arg: "--tls-san=k3d-${CLUSTER_NAME}-server-0"
        nodeFilters: [server:*]
      - arg: "--tls-san=host.k3d.internal"
        nodeFilters: [server:*]
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  runtime:
    ulimits:
      - name: nofile
        soft: 524288
        hard: 524288
