# This manifest deploys a Redis server of type LoadBalancer.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-test-lb
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-test-lb
  template:
    metadata:
      labels:
        app: tcp-test-lb
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-test-lb-svc
  namespace: default
spec:
  # This service will request an IP from the MetalLB pool.
  type: LoadBalancer
  selector:
    app: tcp-test-lb
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
